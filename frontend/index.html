<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>map.gg — Tournament Map</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --accent:    #e8ff47;
      --accent2:   #47c8ff;
      --text:      #e8e8f0;
      --muted:     #6b6b82;
      --danger:    #ff4747;
      --radius:    6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 24px 32px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .logo span { color: var(--muted); }

    .search-row {
      display: flex;
      gap: 10px;
      flex: 1;
      min-width: 260px;
      max-width: 480px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    button#searchBtn {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      flex-shrink: 0;
    }
    button#searchBtn:hover { opacity: .88; }
    button#searchBtn:active { transform: scale(.97); }
    button#searchBtn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Player card ── */
    #playerCard {
      display: none;
      align-items: center;
      gap: 14px;
      /* margin-left: auto; */
      flex-shrink: 0;
    }
    #playerCard.visible { display: flex; }

    #playerAvatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
    }
    #playerName {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--accent);
    }

    /* ── Stats bar ── */
    #statsBar {
      display: none;
      gap: 24px;
      padding: 12px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    #statsBar.visible { display: flex; }

    .stat {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--accent2);
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    /* ── Map ── */
    #map {
      flex: 1;
      min-height: 500px;
    }

    /* Leaflet dark overrides */
    .leaflet-tile { filter: brightness(.72) saturate(.55) hue-rotate(195deg); }
    #map { background: #0a0a0f; }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-attribution {
      background: rgba(10,10,15,.7) !important;
      color: var(--muted) !important;
      font-size: 10px;
    }
    .leaflet-control-attribution a { color: var(--muted) !important; }

    /* Custom marker */
    .t-marker {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #0a0a0f;
      box-shadow: 0 0 8px var(--accent);
      transition: transform .15s;
    }
    .t-marker:hover { transform: scale(1.4); }

    /* Cluster bubble */
    .cluster-bubble {
      background: var(--accent);
      color: #0a0a0f;
      border-radius: 50%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #0a0a0f;
      box-shadow: 0 0 12px var(--accent);
    }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
      min-width: 200px;
    }
    .leaflet-popup-tip { background: var(--surface); }
    .leaflet-popup-content { margin: 14px 16px; }

    .popup-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      color: var(--accent);
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .popup-meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }
    .popup-game {
      display: inline-block;
      margin-top: 8px;
      background: var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--accent2);
    }
    .popup-link {
      display: block;
      margin-top: 10px;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
    }
    .popup-link:hover { text-decoration: underline; }

    /* ── Ko-fi button ── 
    .kofi-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: var(--radius);
      padding: 8px 14px;
      color: #ff5e5b;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .kofi-btn:hover {
      background: #ff5e5b;
      border-color: #ff5e5b;
      color: #fff;
    }
    .kofi-btn svg { flex-shrink: 0; } */
    #status {
      display: none;
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      z-index: 9999;
      max-width: 90vw;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    #status.error { border-color: var(--danger); color: var(--danger); }
    #status.visible { display: block; } 

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .leaflet-tooltip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
  }
  .leaflet-tooltip-top::before {
    border-top-color: var(--border);
  }

  #filterBar {
    display: none;
    gap: 10px;
    padding: 10px 32px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  #filterBar.visible { display: flex; }

  .game-filter {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px 5px 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    transition: all .15s;
    user-select: none;
  }
  .game-filter img {
    width: 20px; height: 20px;
    border-radius: 4px;
    object-fit: cover;
  }
  .game-filter.active {
    border-color: var(--accent);
    color: var(--text);
  }
  .game-filter.active img {
    outline: 1px solid var(--accent);
    border-radius: 4px;
  }
  </style>
</head>
<body>

<header>
  <div class="logo">MAP<span>.</span>GG</div>

  <div class="search-row">
    <input type="text" id="slugInput"
           placeholder="ID start.gg (ex: user/abc123 or just abc123)"
           autocomplete="off" spellcheck="false" />
    <button id="searchBtn">Search</button>
  </div>

  <div id="playerCard">
    <img id="playerAvatar" src="" alt="avatar" />
    <div id="playerName"></div>
  </div>

  <!-- <a class="kofi-btn" href="https://ko-fi.com/TONPSEUDO" target="_blank" rel="noopener">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M23.881 8.948c-.773-4.085-4.859-4.593-4.859-4.593H.723c-.604 0-.679.798-.679.798s-.082 7.324-.022 11.822c.164 2.424 2.586 2.672 2.586 2.672s8.267-.023 11.966-.049c2.438-.426 2.683-2.566 2.658-3.734 4.352.24 7.422-2.831 6.649-6.916zm-11.062 3.511c-1.246 1.453-4.011 3.976-4.011 3.976s-.121.119-.31.023c-.076-.057-.108-.09-.108-.09-.443-.441-3.368-3.049-4.034-3.954-.709-.965-1.041-2.7-.091-3.71.951-1.01 3.005-1.086 4.363.407 0 0 1.565-1.782 3.468-.963 1.904.82 1.832 3.011.723 4.311zm6.173.478c-.928.116-1.682.028-1.682.028V7.284h1.77s1.971.551 1.971 2.638c0 1.913-.985 2.667-2.059 3.015z"/>
    </svg>
  </a> -->
</header>

<div id="statsBar">
  <div class="stat">
    <span class="stat-value" id="statTotal">0</span>
    <span class="stat-label">Tournois total</span>
  </div>
  <div class="stat">
    <span class="stat-value" id="statOffline">0</span>
    <span class="stat-label">Offline sur la carte</span>
  </div>
  <div class="stat">
    <span class="stat-value" id="statCountries">0</span>
    <span class="stat-label">Pays visités</span>
  </div>
  <div class="stat">
    <span class="stat-value" id="statGames">0</span>
    <span class="stat-label">Jeux joués</span>
  </div>
</div>

<div id="filterBar"></div>
<div id="map"></div>
<div id="status"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />

<script>
// ⚙️ Modifie cette URL si ton backend tourne ailleurs
const BACKEND = "https://mapgg-backend-54300574783.europe-west1.run.app";

// ── Map init ──────────────────────────────────────────────────────────────
const map = L.map("map", { center: [20, 0], zoom: 2, zoomControl: true });

// L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
//   attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
//   maxZoom: 18,
// }).addTo(map);

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
}).addTo(map);

let clusterGroup = null;

// ── Status helper ─────────────────────────────────────────────────────────
function showStatus(msg, type = "info") {
  const el = document.getElementById("status");
  el.className = "visible" + (type === "error" ? " error" : "");
  el.innerHTML = type === "loading"
    ? `<span class="spinner"></span>${msg}`
    : msg;
  if (type !== "loading") setTimeout(() => el.classList.remove("visible"), 4000);
}
function hideStatus() {
  document.getElementById("status").classList.remove("visible");
}

// ── Custom marker icon ────────────────────────────────────────────────────
function makeIcon(count = 1) {
  if (count === 1) {
    return L.divIcon({ className: "", html: '<div class="t-marker"></div>', iconSize: [12, 12], iconAnchor: [6, 6] });
  }
  const size = count < 10 ? 32 : count < 50 ? 38 : 44;
  return L.divIcon({
    className: "",
    html: `<div class="cluster-bubble" style="width:${size}px;height:${size}px">${count}</div>`,
    iconSize: [size, size],
    iconAnchor: [size / 2, size / 2],
  });
}

// ── Search ────────────────────────────────────────────────────────────────
async function search() {
  const slug = document.getElementById("slugInput").value.trim();
  if (!slug) return;

  document.getElementById("searchBtn").disabled = true;
  showStatus("Recherche du joueur…", "loading");

  try {
    // 1. Récupère les infos du joueur
    const userRes = await fetch(`${BACKEND}/api/player/${encodeURIComponent(slug)}`);
    const user = await userRes.json();
    if (!userRes.ok) throw new Error(user.error || "Joueur introuvable");

    // Affiche la carte joueur
    const avatar = user.images?.find(i => i.type === "profile")?.url || "";
    document.getElementById("playerAvatar").src = avatar;
    document.getElementById("playerName").textContent = user.displayName;
    document.getElementById("playerCard").classList.add("visible");

    showStatus("Chargement des tournois…", "loading");

    // 2. Récupère les tournois
    const tRes = await fetch(`${BACKEND}/api/tournaments/${user.id}`);
    const tData = await tRes.json();
    if (!tRes.ok) throw new Error(tData.error || "Erreur serveur");

    renderMap(tData, user.displayName);

  } catch (e) {
    showStatus(e.message, "error");
  } finally {
    document.getElementById("searchBtn").disabled = false;
  }
}

// ── Render map ────────────────────────────────────────────────────────────
let allMarkers = [];
let activeGames = new Set();

function renderMap({ total, offline, tournaments }, playerName) {
    if (clusterGroup) map.removeLayer(clusterGroup);
    allMarkers = [];
    activeGames = new Set();

    const countries = new Set();

    for (const t of tournaments) {
      if (t.countryCode) countries.add(t.countryCode);

      const date = t.startAt
        ? new Date(t.startAt * 1000).toLocaleDateString("fr-FR", { year: "numeric", month: "short", day: "numeric" })
        : "Date inconnue";

      const games = t.userGames || [];
      games.forEach(g => activeGames.add(g.name));

      const gameTag = games.length
        ? games.slice(0, 2).map(g => `<span class="popup-game">${g.name}</span>`).join(" ")
        : "";
      const img = t.images?.find(i => i.type === "profile")?.url;
      const imgTag = img ? `<img src="${img}" style="width:100%;border-radius:4px;margin-bottom:8px;object-fit:cover;max-height:80px" />` : "";

      const popup = `
        ${imgTag}
        <div class="popup-title">${t.name}</div>
        <div class="popup-meta">📅 ${date}</div>
        <div class="popup-meta">📍 ${[t.city, t.countryCode].filter(Boolean).join(", ")}</div>
        ${gameTag}
        <a class="popup-link" href="https://www.start.gg/${t.slug}" target="_blank" rel="noopener">↗ Voir sur start.gg</a>
      `;

      const marker = L.marker([t.lat, t.lng], {
        icon: makeIcon(1),
        tooltipCity: [t.city, t.countryCode].filter(Boolean).join(", "),
        gameNames: games.map(g => g.name),
      });
      marker.bindPopup(popup, { maxWidth: 260 });
      marker.bindTooltip(`<b>${t.name}</b><br><span style="color:#6b6b82;font-size:10px">${[t.city, t.countryCode].filter(Boolean).join(", ")}</span>`, {
        direction: "top", offset: [0, -8], opacity: 1
      });
      allMarkers.push(marker);
    }

    // Stats
    document.getElementById("statTotal").textContent = total;
    document.getElementById("statOffline").textContent = offline;
    document.getElementById("statCountries").textContent = countries.size;
    document.querySelector("#statTotal + .stat-label").textContent    = total <= 1    ? "Tournoi total"            : "Tournois totaux";
    document.querySelector("#statOffline + .stat-label").textContent  = offline <= 1  ? "Tournoi offline affiché"  : "Tournois offline affichés";
    document.querySelector("#statCountries + .stat-label").textContent = countries.size <= 1 ? "Pays visité" : "Pays visités";
    document.getElementById("statGames").textContent = activeGames.size;
    document.querySelector("#statGames + .stat-label").textContent = activeGames.size <= 1 ? "Jeu joué" : "Jeux joués";
    document.getElementById("statsBar").classList.add("visible");
    showStatus(`✅ Carte de ${playerName} chargée — ${offline} tournoi${offline > 1 ? "s" : ""} affiché${offline > 1 ? "s" : ""}`, "info");

    // Barre de filtres
    buildFilterBar(tournaments);

    // Affichage initial
    applyFilters();

    if (allMarkers.length > 0) {
      setTimeout(() => {
        if (clusterGroup) {
          const bounds = clusterGroup.getBounds();
          if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 8 });
        }
      }, 100);
    }
  }

  function buildFilterBar(tournaments) {
    const bar = document.getElementById("filterBar");
    bar.innerHTML = "";

    // Collecte tous les jeux uniques avec leur image
    const gameMap = new Map();
    for (const t of tournaments) {
      for (const g of (t.userGames || [])) {
        if (!gameMap.has(g.name)) {
          const imgUrl = g.images?.find(i => i.type === "profile")?.url
                      || g.images?.[0]?.url
                      || "";
          gameMap.set(g.name, imgUrl);
        }
      }
    }

    if (gameMap.size === 0) return;

    // Crée un badge par jeu
    for (const [name, imgUrl] of gameMap.entries()) {
      const badge = document.createElement("div");
      badge.className = "game-filter active";
      badge.dataset.game = name;
      badge.innerHTML = imgUrl
        ? `<img src="${imgUrl}" alt="${name}" />${name}`
        : name;
      badge.addEventListener("click", () => {
        if (activeGames.has(name)) {
          activeGames.delete(name);
          badge.classList.remove("active");
        } else {
          activeGames.add(name);
          badge.classList.add("active");
        }
        applyFilters();
      });
      bar.appendChild(badge);
    }

    bar.classList.add("visible");
  }

  function applyFilters() {
    if (clusterGroup) map.removeLayer(clusterGroup);

    clusterGroup = L.markerClusterGroup({
      iconCreateFunction: (cluster) => makeIcon(cluster.getChildCount()),
      maxClusterRadius: 40,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false,
    });

    clusterGroup.on("clustermouseover", e => {
      const cities = [...new Set(
        e.layer.getAllChildMarkers()
          .map(m => m.options.tooltipCity)
          .filter(Boolean)
      )];
      const label = cities.length <= 2
        ? cities.join(" · ")
        : `${cities[0]} · ${cities[1]} +${cities.length - 2}`;
      e.layer.bindTooltip(`<b>${e.layer.getChildCount()} tournois</b><br><span style="color:#6b6b82;font-size:10px">${label}</span>`, {
        direction: "top", offset: [0, -8], opacity: 1, permanent: false
      }).openTooltip();
    });
    clusterGroup.on("clustermouseout", e => e.layer.unbindTooltip());

    const filtered = allMarkers.filter(m => {
      const games = m.options.gameNames || [];
      if (games.length === 0) return false;
      return games.some(g => activeGames.has(g));
    });

    clusterGroup.addLayers(filtered);
    map.addLayer(clusterGroup);
  }

// ── Events ────────────────────────────────────────────────────────────────
document.getElementById("searchBtn").addEventListener("click", search);
document.getElementById("slugInput").addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});
</script>
</body>
</html>
